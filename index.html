<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Blackjack Hi-Lo</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{min-height:100vh;display:flex;align-items:center;justify-content:center;
  font-family:Georgia,serif;padding:10px;overflow-y:auto;
  background:radial-gradient(ellipse 80% 60% at 50% 30%,#0d4530,#061e14 60%,#020c08)}
.w{width:100%;max-width:600px;background:linear-gradient(160deg,#0f4736,#083020);
  border:2px solid #a07c1a;border-radius:18px;padding:14px 12px;
  box-shadow:0 0 0 1px rgba(212,175,55,.12) inset,0 20px 60px rgba(0,0,0,.75);
  display:flex;flex-direction:column;gap:9px}
.hdr{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;flex-wrap:wrap}
h1{color:#f0d060;font-size:clamp(14px,3vw,20px);letter-spacing:3px;text-transform:uppercase}
h1 small{display:block;font-size:10px;color:rgba(244,236,216,.6);margin-top:3px;font-style:italic}
.tabs{display:flex;flex-direction:column;align-items:flex-end;gap:4px}
.tr{display:flex;gap:4px}
.tlbl{font-size:8px;letter-spacing:1.5px;text-transform:uppercase;color:rgba(244,236,216,.6);text-align:right}
.tab{background:transparent;color:#f4ecd8;border:1px solid rgba(212,175,55,.35);
  padding:4px 8px;border-radius:999px;font-family:inherit;font-size:9px;
  letter-spacing:1px;text-transform:uppercase;cursor:pointer;white-space:nowrap}
.tab.on{background:#d4af37;color:#111;border-color:#d4af37;font-weight:bold}
.stats{display:grid;grid-template-columns:repeat(5,1fr);gap:5px}
.stat{background:rgba(0,0,0,.3);border:1px solid rgba(212,175,55,.22);
  border-radius:8px;padding:6px 3px 5px;text-align:center}
.sl{font-size:clamp(6px,1.3vw,8px);letter-spacing:1px;text-transform:uppercase;color:rgba(244,236,216,.6)}
.sv{font-size:clamp(13px,2.8vw,20px);font-weight:bold;color:#f0d060;margin-top:2px;font-variant-numeric:tabular-nums}
.sv.P{color:#6fdd6f}.sv.N{color:#ff7f70}
.cw{display:flex;flex-direction:column;align-items:center;gap:3px}
.ch{background:rgba(0,0,0,.5);border:1px solid rgba(212,175,55,.3);border-radius:10px;
  padding:7px 22px;font-family:'Courier New',monospace;font-size:clamp(22px,5vw,36px);
  font-weight:bold;letter-spacing:4px;color:#f0d060;font-variant-numeric:tabular-nums;
  min-width:155px;text-align:center}
.ch.R{color:#6fdd6f}.ch.S{color:#ff7f70}
.bt{font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:rgba(244,236,216,.6)}
.bt b{color:#f0d060}
.stage{display:flex;align-items:center;justify-content:center;gap:12px;min-height:170px;padding:3px 0}
.card,.back{height:clamp(110px,23vw,170px);width:calc(clamp(110px,23vw,170px)*5/7);
  border-radius:10px;flex-shrink:0;position:relative}
.card{background:linear-gradient(165deg,#fffef8,#f0e8d5);
  box-shadow:0 10px 26px rgba(0,0,0,.55),inset 0 0 0 5px #fff,inset 0 0 0 6px rgba(0,0,0,.07);
  display:flex;align-items:center;justify-content:center;
  animation:di .4s cubic-bezier(.2,.85,.2,1) both}
.card.d2{animation-delay:.14s}
@keyframes di{from{transform:translateY(-22px) rotate(-4deg) scale(.87);opacity:0}to{transform:none;opacity:1}}
.card.r{color:#c0392b}.card.b{color:#1a1a1a}
.cr{position:absolute;display:flex;flex-direction:column;align-items:center;line-height:1;font-weight:bold}
.cr.tl{top:7%;left:8%}.cr.br{bottom:7%;right:8%;transform:rotate(180deg)}
.cr .rk{font-size:clamp(10px,2.2vw,17px)}.cr .su{font-size:clamp(8px,1.6vw,13px);margin-top:1px}
.cs{font-size:clamp(28px,7.5vw,62px);line-height:1;user-select:none}
.back{background:repeating-linear-gradient(45deg,#8b1818 0 7px,#6a1010 7px 14px);
  border:4px solid #fff;box-shadow:0 10px 26px rgba(0,0,0,.5);overflow:hidden}
.back::after{content:'♠';position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  font-size:clamp(26px,7vw,54px);color:rgba(255,255,255,.2)}
.stage.big .card,.stage.big .back{height:calc(clamp(110px,23vw,170px)*1.18);
  width:calc(clamp(110px,23vw,170px)*1.18*5/7)}
.rcr{display:flex;align-items:center;justify-content:center;gap:12px;min-height:36px}
.rcp{background:rgba(0,0,0,.42);border:1px solid rgba(212,175,55,.35);border-radius:999px;
  padding:5px 20px;font-size:clamp(10px,2vw,13px);letter-spacing:2px;text-transform:uppercase;
  color:rgba(244,236,216,.65);display:flex;align-items:center;gap:10px}
.rcp.hide{opacity:0;pointer-events:none}
.rcn{font-size:clamp(16px,3.5vw,22px);font-weight:bold;font-variant-numeric:tabular-nums}
.rcn.P{color:#6fdd6f}.rcn.N{color:#ff7f70}.rcn.Z{color:#f0d060}
.rcmsk{font-size:clamp(9px,2vw,11px);letter-spacing:1.5px;text-transform:uppercase;
  color:rgba(212,175,55,.45);border:1px dashed rgba(212,175,55,.28);
  border-radius:999px;padding:5px 18px;display:none}
.rcmsk.show{display:block}
.dlt{font-size:clamp(14px,3vw,18px);font-weight:bold;padding:2px 12px;border-radius:999px;opacity:0;pointer-events:none}
.dlt.show{animation:da .9s ease forwards;opacity:1}
@keyframes da{0%{opacity:1;transform:translateY(0)}70%{opacity:1;transform:translateY(-6px)}100%{opacity:0;transform:translateY(-10px)}}
.dlt.P{color:#6fdd6f}.dlt.N{color:#ff7f70}.dlt.Z{color:#f0d060}
.inf{text-align:center;font-size:clamp(9px,1.9vw,11px);letter-spacing:1.5px;
  text-transform:uppercase;color:rgba(244,236,216,.65);min-height:15px}
.inf strong{color:#f0d060}
.ctl{display:flex;justify-content:center;gap:6px;flex-wrap:wrap}
.btn{background:linear-gradient(180deg,#f0d060,#d4af37);color:#111;border:none;
  padding:9px 15px;border-radius:7px;font-family:inherit;font-size:clamp(9px,1.9vw,11px);
  font-weight:bold;letter-spacing:1.2px;text-transform:uppercase;cursor:pointer;white-space:nowrap}
.btn:disabled{opacity:.35;cursor:not-allowed}
.btn.g{background:transparent;color:#f4ecd8;border:1px solid rgba(212,175,55,.4);box-shadow:none}
.btn.sm{background:transparent;color:rgba(212,175,55,.55);border:1px solid rgba(212,175,55,.22);
  box-shadow:none;font-size:9px;padding:6px 11px}
.btn.sm.on{color:#f0d060;border-color:#a07c1a}
.spr{display:flex;align-items:center;justify-content:center;gap:9px;
  font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:rgba(244,236,216,.65)}
input[type=range]{accent-color:#d4af37;width:clamp(80px,22vw,130px);cursor:pointer}
.leg{text-align:center;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;
  color:rgba(244,236,216,.36);padding-top:4px;border-top:1px solid rgba(212,175,55,.1)}
.leg b{color:#f0d060}
.ovl{display:none;position:fixed;inset:0;background:rgba(2,12,7,.9);
  backdrop-filter:blur(6px);align-items:center;justify-content:center;z-index:100;padding:16px}
.ovl.open{display:flex}
.ovc{background:linear-gradient(160deg,#0f4736,#082e1e);border:1px solid #a07c1a;
  border-radius:16px;padding:26px 22px;display:flex;flex-direction:column;
  align-items:center;gap:13px;width:100%;max-width:310px}
.ovc h2{font-size:12px;letter-spacing:3px;text-transform:uppercase;color:#f0d060;text-align:center}
.gr{display:flex;gap:8px;align-items:center}
.gi{width:96px;padding:10px 12px;text-align:center;background:rgba(0,0,0,.45);
  border:1px solid #a07c1a;color:#f0d060;border-radius:8px;
  font-family:inherit;font-size:22px;font-weight:bold;outline:none}
.gi:focus{border-color:#d4af37}
.fb{text-align:center;font-size:12px;min-height:18px;color:#f0d060;line-height:1.5}
.fb.ok{color:#6fdd6f}.fb.er{color:#ff7f70}
.otc{font-size:11px;color:rgba(244,236,216,.65);text-align:center;min-height:15px}
</style>

  <script src="game.js"></script>
</head>
<body>
<div class="w">
  <div class="hdr">
    <h1>Blackjack<small>Entraîneur Hi-Lo</small></h1>
    <div class="tabs">
      <div class="tlbl">Mode</div>
      <div class="tr" id="mG">
        <button class="tab on" data-mode="pair">Paires</button>
        <button class="tab" data-mode="card">Carte/Carte</button>
      </div>
      <div class="tlbl" style="margin-top:4px">Sabot</div>
      <div class="tr" id="dG">
        <button class="tab on" data-deck="1">1 jeu</button>
        <button class="tab" data-deck="6">6 jeux</button>
        <button class="tab" data-deck="8">8 jeux</button>
      </div>
    </div>
  </div>
  <div class="stats">
    <div class="stat"><div class="sl">Restantes</div><div class="sv" id="xRem">52</div></div>
    <div class="stat"><div class="sl">Jouées</div><div class="sv" id="xPl">0</div></div>
    <div class="stat"><div class="sl" id="xUlbl">Paires</div><div class="sv" id="xRd">0</div></div>
    <div class="stat"><div class="sl">True Count</div><div class="sv" id="xTC">—</div></div>
    <div class="stat"><div class="sl">RC réel</div><div class="sv" id="xRCs">0</div></div>
  </div>
  <div class="cw">
    <div class="ch" id="xChrono">00:00.0</div>
    <div class="bt">Meilleur (sabot complet) : <b id="xBest">—</b></div>
  </div>
  <div class="stage" id="xStage">
    <div class="back"></div><div class="back"></div>
  </div>
  <div class="rcr">
    <div class="rcp" id="xPill">RC : <span class="rcn Z" id="xRC">0</span></div>
    <div class="rcmsk" id="xMask">RC masqué</div>
    <span class="dlt" id="xDlt"></span>
  </div>
  <div class="inf" id="xInf">Appuyez sur <strong>Distribuer</strong> pour commencer</div>
  <div class="ctl">
    <button class="btn" id="bDeal">Distribuer</button>
    <button class="btn g" id="bAuto">&#9205; Auto</button>
    <button class="btn g" id="bTest">Tester RC</button>
    <button class="btn sm on" id="bVis">&#128065; RC visible</button>
    <button class="btn g" id="bRst">&#8634; Reset</button>
  </div>
  <div class="spr">
    <span>Vitesse auto</span>
    <input type="range" id="xSpd" min="400" max="3500" step="100" value="1400"/>
    <span id="xSpdL">1.4s</span>
  </div>
  <div class="leg">
    <b>Hi-Lo</b> : 2 3 4 5 6 = <b>+1</b> &nbsp; 7 8 9 = <b>0</b> &nbsp; 10 J Q K A = <b>-1</b>
  </div>
</div>
<div class="ovl" id="xOvl">
  <div class="ovc">
    <h2>Tester votre RC</h2>
    <div class="gr">
      <input class="gi" type="number" id="xGi" placeholder="0" inputmode="numeric"/>
      <button class="btn" id="bOK">OK</button>
    </div>
    <div class="fb" id="xFb"></div>
    <div class="otc" id="xOtc"></div>
    <button class="btn g" id="bCls" style="font-size:9px;padding:6px 13px">Fermer</button>
  </div>
</div>

<div style="position:fixed;bottom:0;left:0;right:0;z-index:999;text-align:center;background:#0a1018">

<script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
</div>
</body>
</html>
